<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Arena di Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8F9FC; }
    .font-display { font-family: 'Space Grotesk', sans-serif; }
    .card-in { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="w-full md:max-w-3xl lg:max-w-5xl mx-auto min-h-screen shadow-xl flex flex-col relative overflow-x-hidden">

  <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-40 px-5 py-4 flex justify-between items-center">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-xl bg-indigo-600 flex items-center justify-center"><span class="text-white font-bold text-sm">MA</span></div>
      <h1 class="font-display font-bold text-lg text-slate-900">ArenaStudio</h1>
    </div>
    <div id="user-profile-badge" class="hidden items-center gap-2 bg-slate-50 rounded-full pl-2.5 pr-3 py-1">
      <span class="text-xs font-bold text-slate-600" id="header-username">—</span>
      <span class="text-xs font-black text-indigo-600" id="header-elo">1000 🏆</span>
    </div>
  </header>

  <main class="flex-1 w-full p-5">
    <section id="screen-splash" class="py-20 text-center hidden"><p>Caricamento...</p></section>

    <section id="screen-welcome" class="text-center py-10 space-y-4">
      <h1 class="text-3xl font-display font-bold">Match Accademico</h1>
      <button id="btn-go-login" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">Accedi</button>
      <button id="btn-go-register" class="w-full bg-white border border-slate-200 py-3 rounded-xl font-bold">Crea Profilo</button>
      <button id="btn-avvia-demo" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold">Prova la Demo 🚀</button>
    </section>

    <section id="screen-dashboard" class="hidden">
      <div id="dashboard-lista-materie" class="grid md:grid-cols-2 gap-4"></div>
    </section>

    <section id="screen-hub" class="hidden">
      <div id="hub-main-rooms" class="grid md:grid-cols-3 gap-4">
        <button id="btn-room-buddy" class="bg-indigo-50 p-5 rounded-2xl text-left border border-indigo-100">
          <h3 class="font-bold text-indigo-900">Compagni</h3>
        </button>
        <button id="btn-start-quiz" class="bg-rose-50 p-5 rounded-2xl text-left border border-rose-100">
          <h3 class="font-bold text-rose-900">Arena Quiz</h3>
        </button>
        <button id="btn-room-consigli" class="bg-emerald-50 p-5 rounded-2xl text-left border border-emerald-100">
          <h3 class="font-bold text-emerald-900">Consigli</h3>
        </button>
      </div>
    </section>
  </main>

  <script>
    const URL_GOOGLE_APPS_SCRIPT = "TUO_LINK_QUI";

    // LOGICA DEMO
    document.getElementById("btn-avvia-demo").addEventListener("click", () => {
      utenteLoggato = { username: "Studente_Demo", elo: 1250, uid: "demo" };
      elencoMaterieUtente = [{ materia: "Anatomia", professore: "Dr. Virtual", statoStudio: "Ripetizione" }];
      apriDashboardHome();
      alert("Sei in modalità Demo. I dati non verranno salvati.");
    });

    // Controllo Demo nelle funzioni critiche
    function checkDemo() {
      if (utenteLoggato && utenteLoggato.uid === "demo") {
        alert("Funzione non disponibile in modalità Demo.");
        return true;
      }
      return false;
    }

    // ESEMPIO DI UTILIZZO NELL'AGGIUNTA MATERIA
    // if (checkDemo()) return;
    
    // ... (Il resto del tuo JS originale) ...
  </script>
</body>
</html>
